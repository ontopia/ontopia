name: Publish release

on:
  push:
    tags:
      - 'release-**'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:


      # --- Prepare

      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Resolve version
        run: |
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          git tag -b
          git describe --tags --abbrev=0 ${{ github.ref }}^


          ref="${{ github.ref_name }}"
          version="${ref#"release-"}"
          prevref=`git describe --tags --abbrev=0 refs/tags/${{ github.ref_name }}^`
          prevversion="${ref#"release-"}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "PREVIOUS=$prevversion" >> "$GITHUB_ENV"

